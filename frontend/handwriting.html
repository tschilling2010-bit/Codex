<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HefterPro &mdash; Handschrift</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/css/styles.css?v=41" />
</head>
<body>

  <!-- ====== Nav: Profile left, Brand center, Gear right ====== -->
  <header class="nav">
    <div class="container nav-inner">
      <div class="profile-selector" id="profile-selector">
        <button class="profile-btn" id="profile-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="profile-btn-name">Schrift w&auml;hlen</span>
          <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
        </button>
        <div class="profile-dropdown" id="profile-dropdown" style="display:none">
          <div id="profile-dropdown-list"></div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-add" id="btn-add-profile" type="button">+ Neue Schrift</button>
          <div id="new-profile-inline" style="display:none;padding:8px 12px">
            <input id="new-profile-name" class="input" placeholder="z.B. Meine Handschrift" style="font-size:14px;padding:8px 10px;margin-bottom:6px" />
            <div style="display:flex;gap:6px">
              <button class="btn btn-primary" id="btn-new-confirm" type="button" style="padding:6px 16px;font-size:13px">Erstellen</button>
              <button class="btn btn-ghost" id="btn-new-cancel" type="button" style="padding:6px 12px;font-size:13px">&times;</button>
            </div>
          </div>
        </div>
      </div>

      <a class="brand" href="/"><span class="dot"></span>HefterPro</a>

      <button class="gear-btn" id="btn-gear" type="button" title="Einstellungen">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="3"/>
          <path d="M16.47 12.47a1.5 1.5 0 0 0 .3 1.65l.05.06a1.82 1.82 0 1 1-2.57 2.57l-.06-.06a1.5 1.5 0 0 0-1.65-.3 1.5 1.5 0 0 0-.91 1.37v.17a1.82 1.82 0 1 1-3.64 0v-.09a1.5 1.5 0 0 0-.98-1.37 1.5 1.5 0 0 0-1.65.3l-.06.06a1.82 1.82 0 1 1-2.57-2.57l.06-.06a1.5 1.5 0 0 0 .3-1.65 1.5 1.5 0 0 0-1.37-.91h-.17a1.82 1.82 0 1 1 0-3.64h.09a1.5 1.5 0 0 0 1.37-.98 1.5 1.5 0 0 0-.3-1.65l-.06-.06a1.82 1.82 0 1 1 2.57-2.57l.06.06a1.5 1.5 0 0 0 1.65.3h.07a1.5 1.5 0 0 0 .91-1.37v-.17a1.82 1.82 0 1 1 3.64 0v.09a1.5 1.5 0 0 0 .91 1.37 1.5 1.5 0 0 0 1.65-.3l.06-.06a1.82 1.82 0 1 1 2.57 2.57l-.06.06a1.5 1.5 0 0 0-.3 1.65v.07a1.5 1.5 0 0 0 1.37.91h.17a1.82 1.82 0 0 1 0 3.64h-.09a1.5 1.5 0 0 0-1.37.91z"/>
        </svg>
      </button>
    </div>
    <div class="nav-rainbow"></div>
  </header>

  <!-- ====== Main: Two-column editor ====== -->
  <main class="container main-editor">
    <div class="two-col-layout">

      <!-- LEFT: Text + actions -->
      <div class="editor-card">
        <textarea id="text" class="textarea" placeholder="Hallo Welt!&#10;&#10;- Stichpunkt&#10;1. Nummeriert&#10;&#10;Leerzeile = Absatz"></textarea>

        <!-- Editor-Actions: Rendern | Export (nach Rendern) | ◆ -->
        <div class="editor-actions">
          <button class="btn btn-primary btn-render" id="btn-render" type="button" disabled>Rendern</button>

          <!-- Export: erscheint erst nach Rendern -->
          <div class="export-wrap" id="export-wrap" style="display:none">
            <button class="btn-icon" id="btn-export" type="button" title="Exportieren">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <div class="export-menu" id="export-menu" style="display:none">
              <button class="export-opt" data-fmt="pdf" type="button">PDF</button>
              <button class="export-opt" data-fmt="png" type="button">PNG</button>
            </div>
          </div>

          <!-- KI-Toggle ◆ -->
          <button class="gemini-toggle" id="gemini-toggle" type="button" title="KI-Modus" style="margin-left:auto">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2c-.4 6.8-4.8 9.6-10 10 5.2.4 9.6 3.2 10 10 .4-6.8 4.8-9.6 10-10-5.2-.4-9.6-3.2-10-10z"/>
            </svg>
          </button>
        </div>

        <!-- KI-Panel: erscheint nur im KI-Modus -->
        <div class="ki-panel ki-only" id="ki-panel">
          <!-- Modus-Tabs -->
          <div class="ki-mode-tabs" id="ki-mode-tabs">
            <button class="ki-tab active" data-mode="transcribe" type="button" title="Abschreiben">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              <span>Abschreiben</span>
            </button>
            <button class="ki-tab" data-mode="summary" type="button" title="Zusammenfassung">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              <span>Zusammenfassung</span>
            </button>
            <button class="ki-tab" data-mode="prompt" type="button" title="Eigener Prompt">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Eigener Prompt</span>
            </button>
          </div>

          <!-- Custom-Prompt-Textarea (nur im Prompt-Modus) -->
          <textarea id="ki-custom-prompt" class="ki-prompt-input" style="display:none"></textarea>

          <!-- Upload-Bereich: Foto / Datei -->
          <label class="ki-upload-area" id="ki-upload-label" for="ki-file-input">
            <input type="file" id="ki-file-input" accept="image/*,application/pdf" multiple style="display:none" />
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span id="ki-upload-label-text">Foto oder Datei w&auml;hlen</span>
          </label>

          <!-- Text-Quelle hinzufügen -->
          <button class="ki-text-tile" id="btn-ki-text" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span class="ki-text-preview" id="ki-text-preview">Text hinzuf&uuml;gen</span>
          </button>

          <!-- Analysieren-Button -->
          <button class="ki-analyze-btn" id="btn-ki-analyze" type="button" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-.4 6.8-4.8 9.6-10 10 5.2.4 9.6 3.2 10 10 .4-6.8 4.8-9.6 10-10-5.2-.4-9.6-3.2-10-10z"/></svg>
            Analysieren
          </button>

          <div id="ki-status" class="status-inline"></div>
        </div>

        <!-- Highlight bar (appears after render) -->
        <div id="highlight-bar" class="highlight-bar" style="display:none">
          <!-- KI-Marker-Zeile: nur im KI-Modus nach Rendern -->
          <div class="ki-marker-row ki-only" id="ki-marker-row" style="display:none">
            <button class="ki-marker-btn" id="btn-ki-marker" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-.4 6.8-4.8 9.6-10 10 5.2.4 9.6 3.2 10 10 .4-6.8 4.8-9.6 10-10-5.2-.4-9.6-3.2-10-10z"/></svg>
              KI-Marker anwenden
            </button>
            <span id="ki-marker-count" class="muted" style="font-size:12px"></span>
          </div>

          <div class="hl-top-row">
            <div class="hl-mode-toggle">
              <button class="hl-mode-btn active" data-mode="marker" type="button">Marker</button>
              <button class="hl-mode-btn" data-mode="text" type="button">Buchstaben</button>
              <button class="hl-mode-btn" data-mode="eraser" type="button">Radiergummi</button>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <button class="hl-tool-toggle" id="btn-hl-range" type="button" title="Bereich: Erstes &amp; letztes Wort anklicken">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8L3 12l4 4"/><path d="M3 12h18"/><path d="M17 8l4 4-4 4"/></svg>
              </button>
              <button class="btn btn-ghost btn-xs" id="btn-hl-clear" type="button">Alle entfernen</button>
            </div>
          </div>
          <div class="hl-color-row">
            <div id="hl-favorites" class="hl-favorites"></div>
            <button class="hl-add-btn" id="btn-hl-add" type="button" title="Farbe hinzuf&uuml;gen">+</button>
          </div>
          <div id="hl-add-panel" class="hl-add-panel" style="display:none">
            <input type="color" id="hl-color-picker" value="#FFD600" class="hl-add-picker" />
            <button class="btn btn-primary btn-xs" id="btn-hl-confirm" type="button">Hinzuf&uuml;gen</button>
          </div>
        </div>

        <div id="status" class="status-inline"></div>
      </div>

      <!-- RIGHT: Preview -->
      <div class="preview-card">
        <div id="preview" class="preview-wrap">
          <div class="empty-state-nice">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><path d="M12 2l2 6.5L21 11l-7 2.5L12 20l-2-6.5L3 11l7-2.5L12 2z"/><path d="M5 3l1 3.5L10 8 6 9.5 5 13l-1-3.5L0 8l4-1.5L5 3z" transform="translate(13,-1) scale(0.5)"/></svg>
            <p>Text eingeben und &bdquo;Rendern&ldquo; klicken.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ====== Gear panel (slide-in): Settings + Templates + Delete ====== -->
  <div class="settings-panel-overlay" id="settings-overlay"></div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-panel-header">
      <h3 style="margin:0; font-size:18px">Einstellungen</h3>
      <button class="btn btn-ghost settings-panel-close" id="btn-panel-close" type="button">&times;</button>
    </div>
    <div class="settings-panel-body stack">

      <!-- Rendering settings -->
      <div class="panel-section">
        <div class="panel-label">Darstellung</div>
        <div class="panel-grid">
          <div>
            <label class="field" for="s-size">Gr&ouml;&szlig;e: <span id="s-size-val">1.0&times;</span></label>
            <input id="s-size" type="range" min="0.6" max="1.8" step="0.05" value="1.0" style="width:100%" />
          </div>
          <div>
            <label class="field" for="s-thickness">Strichst&auml;rke: <span id="s-thickness-val">1.0&times;</span></label>
            <input id="s-thickness" type="range" min="0.5" max="2.0" step="0.05" value="1.0" style="width:100%" />
          </div>
          <div>
            <label class="field" for="s-ink">Tintenfarbe</label>
            <input id="s-ink" class="input" type="color" value="#000000" style="height:40px;padding:4px 8px;width:100%" />
          </div>
          <div>
            <label class="field" for="s-sheet">Blattart</label>
            <select id="s-sheet" class="select">
              <option value="liniert">Liniert</option>
              <option value="kariert">Kariert</option>
              <option value="blanko">Blanko</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Templates -->
      <div class="panel-section">
        <div class="panel-label">Vorlagen</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <a id="template-download" class="btn btn-ghost" style="padding:8px 16px;font-size:13px" download>Template PDF</a>
          <span class="muted" style="font-size:12px">Ausdrucken &amp; fotografieren</span>
        </div>
        <div id="pair-status" class="status" style="display:none"></div>
        <div id="variants-list" class="stack-sm"></div>
        <button class="btn btn-soft btn-sm" id="btn-variant-add" type="button" style="margin-top:8px">+ Variante</button>
      </div>

      <!-- Danger zone -->
      <div class="panel-section" style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border)">
        <button class="btn btn-ghost btn-sm" id="btn-delete" type="button" style="color:var(--err);width:100%">Schrift l&ouml;schen</button>
      </div>
    </div>
  </div>

  <!-- KI Text-Input Modal -->
  <div class="ki-text-modal-overlay" id="ki-text-modal-overlay">
    <div class="ki-text-modal">
      <h4>Text als Quelle hinzuf&uuml;gen</h4>
      <textarea class="ki-text-modal-input" id="ki-text-modal-input" placeholder="Eigenen Text eingeben&hellip;"></textarea>
      <div class="ki-text-modal-actions">
        <button class="btn btn-ghost" id="btn-ki-text-cancel" type="button">Abbrechen</button>
        <button class="btn btn-primary" id="btn-ki-text-save" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Export filename modal -->
  <div class="export-modal-overlay" id="export-modal-overlay" style="display:none">
    <div class="export-modal">
      <h4>Datei benennen</h4>
      <input id="export-filename" class="input" placeholder="Dateiname" />
      <div class="export-modal-actions">
        <button class="btn btn-ghost" id="btn-export-cancel" type="button">Abbrechen</button>
        <button class="btn btn-primary" id="btn-export-confirm" type="button">Download</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js?v=41"></script>
  <script src="/js/api.js?v=41"></script>
  <script src="/js/persist.js?v=41"></script>
  <script src="/js/handwriting.js?v=41"></script>
</body>
</html>
