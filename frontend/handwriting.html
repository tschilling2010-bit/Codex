<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text zu Handschrift — HefterPro</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/"><span class="dot"></span>HefterPro</a>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/handwriting.html">Handschrift</a>
        <a href="/hefter.html">Hefterblatt</a>
        <a href="/downloads.html">Downloads</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:40px; padding-bottom:64px">
    <div class="stack-lg">
      <div class="page-header">
        <span class="eyebrow">Funktion 1</span>
        <h2>Text zu Handschrift</h2>
        <p>Natürlich wirkende Handschrift — sofort bereit, kein Template nötig.</p>
      </div>

      <div class="grid cols-2">
        <section class="card stack">
          <div>
            <label class="field" for="text">Dein Text</label>
            <textarea id="text" class="textarea" placeholder="Gib hier den Text ein, der in Handschrift umgewandelt werden soll…"></textarea>
          </div>

          <div class="field-row">
            <div>
              <label class="field" for="profile">Handschrift-Stil</label>
              <select id="profile" class="select"></select>
            </div>
            <div>
              <label class="field" for="sheet">Blatt-Typ</label>
              <select id="sheet" class="select">
                <option value="liniert">Liniert</option>
                <option value="kariert">Kariert</option>
                <option value="blanko">Blanko</option>
              </select>
            </div>
            <div>
              <label class="field" for="ink">Tinte</label>
              <input id="ink" class="input" type="color" value="#16306b" style="height:44px; padding:4px 8px" />
            </div>
          </div>

          <div class="toolbar">
            <button class="btn btn-primary" id="btn-render">Rendern</button>
            <div class="toolbar-spacer"></div>
            <button class="btn btn-soft" data-format="pdf" id="btn-pdf" disabled>PDF</button>
            <button class="btn btn-soft" data-format="png" id="btn-png" disabled>PNG</button>
            <button class="btn btn-soft" data-format="jpg" id="btn-jpg" disabled>JPG</button>
          </div>
          <div id="status" class="status">Bereit.</div>
        </section>

        <section class="stack">
          <h3 style="margin:0; font-size:18px">Live-Vorschau</h3>
          <div id="preview" class="preview-wrap">
            <div class="empty-state">Noch keine Vorschau. Text eingeben und „Rendern" klicken.</div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site"><div class="container">HefterPro · made for students</div></footer>

  <script src="/js/common.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/handwriting.js"></script>
</body>
</html>
