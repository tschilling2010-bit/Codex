<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vorschau — HefterPro</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/"><span class="dot"></span>HefterPro</a>
      <nav class="nav-links">

        <div>

        <div class="empty-state">Lade Projekt…</div>
