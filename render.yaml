services:
  - type: web
    name: ai-trading-bot
    runtime: python
    branch: claude/ai-trading-bot-qZGLD
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HEFTERPRO_STORAGE
        value: /var/data/trading
      - key: ANTHROPIC_API_KEY
        sync: false   # Du trägst den Key manuell in Render ein
    disk:
      name: trading-data
      mountPath: /var/data/trading
      sizeGB: 1
