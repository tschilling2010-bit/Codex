services:
  - type: web
    name: hefterpro
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HEFTERPRO_STORAGE
        value: /var/data/hefterpro
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: "dall-e-3"
      - key: OPENAI_TEXT_MODEL
        value: "gpt-4o-mini"
    disk:
      name: hefterpro-data
      mountPath: /var/data/hefterpro
      sizeGB: 1
