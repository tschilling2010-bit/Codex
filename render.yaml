services:
  - type: web
    name: hefterpro
    runtime: python
    branch: claude/create-hefterpro-app-gBiYe
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HEFTERPRO_STORAGE
        value: /tmp/hefterpro-storage
