services:
  - type: web
    name: hefterpro
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HEFTERPRO_STORAGE
        value: /var/data/hefterpro
    disk:
      name: hefterpro-data
      mountPath: /var/data/hefterpro
      sizeGB: 1
